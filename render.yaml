services:
  # A PostgreSQL database
  - type: web
    name: tourmanagement-auth
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.index:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tourmanagement-db
          property: connectionString

databases:
  - name: tourmanagement-db
    databaseName: tourmanagmentappdb
    user: touradmin
    plan: free
